<script>
const P=1, T=0, F=-1;
const DN=['Lun','Mar','Mié','Jue','Vie'];
let mesVisualizandose = new Date(2026, 5, 1); // Junio 2026

let FLAB = {};
let VACACIONES = {};
let DB_PROGRAMACION = [];
let filtroUsuarioActivo = null;

const WK=[
  ['An','Andrés','b-an','av-an'],
  ['Vi','Victor','b-vi','av-vi'],
  ['Me','Mela',  'b-me','av-me'],
  ['My','Mey',   'b-my','av-my'],
  ['Ml','Meli',  'b-ml','av-ml']
];

function fkey(d){return`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`}

async function cargarDatosBase() {
  try {
    const resF = await fetch('./data/feriados.json'); FLAB = await resF.json();
    const resV = await fetch('./data/vacaciones.json'); VACACIONES = await resV.json();
    const resP = await fetch('./data/programacion.json'); DB_PROGRAMACION = await resP.json();
    renderizarCalendario();
  } catch (error) {
    console.error("Error cargando archivos JSON desde /data:", error);
    alert("Error crítico al inicializar las bases de datos locales en GitHub Pages.");
  }
}

function renderizarCalendario() {
  const cal = document.getElementById('cal'); cal.innerHTML = '';
  const mNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('mes-actual').textContent = `${mNames[mesVisualizandose.getMonth()]} ${mesVisualizandose.getFullYear()}`;

  const telC={An:0,Vi:0,Me:0,My:0,Ml:0}, telDay={An:[0,0,0,0,0],Vi:[0,0,0,0,0],Me:[0,0,0,0,0],My:[0,0,0,0,0],Ml:[0,0,0,0,0]};
  const mes = mesVisualizandose.getMonth(), año = mesVisualizandose.getFullYear();

  let curr = new Date(año, mes, 1);
  curr.setDate(curr.getDate() - (curr.getDay() === 0 ? 6 : curr.getDay() - 1)); 
  let hasta = new Date(año, mes + 1, 0);
  hasta.setDate(hasta.getDate() + (hasta.getDay() === 0 ? 0 : 7 - hasta.getDay())); 

  while(curr < hasta) {
    let tieneDiasDelMes = false;
    for(let i=0; i<5; i++) {
      let check = new Date(curr); check.setDate(check.getDate() + i);
      if(check.getMonth() === mes) tieneDiasDelMes = true;
    }
    if(!tieneDiasDelMes) { curr.setDate(curr.getDate() + 7); continue; }

    const wb = document.createElement('div'); wb.className = 'wb';
    const wl = document.createElement('div'); wl.className = 'wlbl';
    let fIni = new Date(curr), fFin = new Date(curr); fFin.setDate(fFin.getDate() + 4);
    
    let habiles = 0;
    for(let i=0; i<5; i++){
      let chk = new Date(curr); chk.setDate(chk.getDate()+i);
      if(!FLAB[fkey(chk)] && dataDiaIn_k(fkey(chk)) !== F) habiles++;
    }
    let nota = habiles === 5 ? "" : habiles >= 4 ? "1 feriado → máx 1 tel/persona" : "todos presenciales";
    wl.innerHTML = `${fIni.getDate()} ${mNames[fIni.getMonth()].substring(0,3)} – ${fFin.getDate()} ${mNames[fFin.getMonth()].substring(0,3)}`;
    if(nota) wl.innerHTML += `<span class="wnote">${nota}</span>`;
    wb.appendChild(wl);

    const grid = document.createElement('div'); grid.className = 'grid';
    for(let i=0; i<5; i++) {
      let d = new Date(curr); d.setDate(d.getDate() + i); let key = fkey(d);
      
      // CAMBIO CLAVE: Si no hay registro en el JSON, la celda se asume vacía de teletrabajo. NO autogenera nada.
      let dataDia = DB_PROGRAMACION.find(x => x.fecha === key) || null;
      let isFer = FLAB[key] || (dataDia && dataDia.An === F);
      let vacHoy = VACACIONES[key] || [];

      const col = document.createElement('div'); col.className = 'dc' + (isFer ? ' feriado' : '');
      col.innerHTML = `<div class="dc-day">${DN[i]}</div><div class="dc-num">${d.getDate()}</div>`;

      if(isFer) {
        col.innerHTML += `<div class="fer-lbl">✕ ${FLAB[key] || 'No laborable'}</div>`;
      } else {
        const bl = document.createElement('div'); bl.className = 'tel-list';
        let hasTel = false;

        // Solo procesamos teletrabajo si el día ya existe explícitamente en la BD
        if (dataDia) {
          WK.forEach(([k, name, bcls]) => {
            let esT = dataDia[k] === T, isVac = vacHoy.includes(k);
            if(esT) {
              const b = document.createElement('span'); b.className = `b ${bcls}`;
              if(filtroUsuarioActivo && filtroUsuarioActivo !== k) b.classList.add('blur');
              b.textContent = name + (isVac ? ' 🌴' : ''); bl.appendChild(b);
              if(d.getMonth() === mes) { telC[k]++; telDay[k][i]++; }
              hasTel = true;
            } else if(isVac && (k === 'Ml' || k === 'Me')) {
              const b = document.createElement('span'); b.className = `b b-${k.toLowerCase()}`; b.style.opacity = '0.4';
              if(filtroUsuarioActivo && filtroUsuarioActivo !== k) b.classList.add('blur');
              b.textContent = `${name} 🌴`; bl.appendChild(b); hasTel = true;
            }
          });
        }
        
        // Si no hay teletrabajo asignado en el JSON o el día no está programado aún, sale guión corto indicando presencial
        if(!hasTel) bl.innerHTML = `<div style="font-size:9px;color:#d0cdc7;font-style:italic;margin-top:2px">—</div>`;
        col.appendChild(bl);
      }
      grid.appendChild(col);
    }
    wb.appendChild(grid); cal.appendChild(wb); curr.setDate(curr.getDate() + 7);
  }
  actualizarMétricas(telC, telDay);
}

function dataDiaIn_k(f) { let x = DB_PROGRAMACION.find(d=>d.fecha===f); return x ? x.An : P; }

function actualizarMétricas(telC, telDay) {
  const cardsEl = document.getElementById('cards'); cardsEl.innerHTML = '';
  WK.forEach(([k,name])=>{
    cardsEl.innerHTML += `<div class="sc"><div class="sc-avatar av-${k.toLowerCase()}">${name[0]}</div><div class="sc-n">${name}</div><div class="sc-v">${telC[k]}</div><div class="sc-s">días mes</div></div>`;
  });
  const tbody = document.getElementById('daybody'); tbody.innerHTML = '';
  WK.forEach(([k,name])=>{
    let r = `<tr><td><div class="person-cell"><div class="avatar-sm av-${k.toLowerCase()}">${name[0]}</div><span style="font-weight:600">${name}</span></div></td>`;
    [0,1,2,3,4].forEach(i=> r += `<td><span class="num-cell">${telDay[k][i]}</span></td>`);
    tbody.innerHTML += r + `</tr>`;
  });
}

function cambiarMes(dir) { mesVisualizandose.setMonth(mesVisualizandose.getMonth() + dir); renderizarCalendario(); }

document.getElementById('badges-filtro').addEventListener('click', (e) => {
  const pip = e.target.closest('.pip'); if(!pip || !pip.dataset.user) return;
  const u = pip.dataset.user; document.querySelectorAll('.pip').forEach(p => p.classList.remove('active', 'blur'));
  if(filtroUsuarioActivo === u) { filtroUsuarioActivo = null; } 
  else { filtroUsuarioActivo = u; pip.classList.add('active'); document.querySelectorAll('.pip').forEach(p => { if(p !== pip && p.dataset.user) p.classList.add('blur'); }); }
  renderizarCalendario();
});

// EL MOTOR SOLO SE ACTIVA DESDE AQUÍ
function ejecutarChocolateador() {
  const m = mesVisualizandose.getMonth(), a = mesVisualizandose.getFullYear();
  
  // Definir rango exacto del mes seleccionado
  let primerDiaMes = new Date(a, m, 1);
  let ultimoDiaMes = new Date(a, m + 1, 0);

  // Forzar que el motor trabaje semana completa desde el lunes previo hasta el domingo posterior
  let fIni = new Date(primerDiaMes); fIni.setDate(fIni.getDate() - (fIni.getDay() === 0 ? 6 : fIni.getDay() - 1));
  let fFin = new Date(ultimoDiaMes); fFin.setDate(fFin.getDate() + (fFin.getDay() === 0 ? 0 : 7 - fFin.getDay()));

  let nuevasAsignaciones = [];
  let curr = new Date(fIni);
  let bdTemporal = [...DB_PROGRAMACION];

  while(curr < fFin) {
    let diasSemana = [];
    for(let i=0; i<5; i++){
      let d = new Date(curr); d.setDate(d.getDate() + i);
      diasSemana.push(d);
    }

    let habiles = diasSemana.filter(d => !FLAB[fkey(d)]);
    let conteoHabiles = habiles.length;
    let totalDiasAsignar = conteoHabiles === 5 ? 2 : conteoHabiles >= 4 ? 1 : 0;
    let usuarios = ['An', 'Vi', 'Me', 'My'];

    let exitoSemana = false;
    let intentosSemana = 0;

    while(!exitoSemana && intentosSemana < 500) {
      intentosSemana++;
      let propuesta = diasSemana.map(d => {
        let k = fkey(d);
        if(FLAB[k]) return { fecha: k, An:F, Vi:F, Me:F, My:F, Ml:P };
        return { fecha: k, An:P, Vi:P, Me:P, My:P, Ml:P };
      });

      let valido = true;
      usuarios.forEach(u => {
        let asignados = 0;
        let intentosUser = 0;
        while(asignados < totalDiasAsignar && intentosUser < 50) {
          intentosUser++;
          let diaTarget = habiles[Math.floor(Math.random() * habiles.length)];
          let pDia = propuesta.find(p => p.fecha === fkey(diaTarget));
          if(pDia[u] === P) { pDia[u] = T; asignados++; }
        }
        if(asignados < totalDiasAsignar) valido = false;
      });

      if(!valido) continue;

      let checkDuras = true;
      for(let i=0; i<propuesta.length; i++) {
        let dia = propuesta[i];
        if(dia.An === T && dia.Vi === T) { checkDuras = false; break; }

        let fActual = diasSemana[i];
        let fAyer = new Date(fActual); fAyer.setDate(fAyer.getDate() - 1);
        let dataAyer = propuesta.find(p => p.fecha === fkey(fAyer)) || bdTemporal.find(b => b.fecha === fkey(fAyer));
        
        if(dataAyer) {
          if(dia.An === T && dataAyer.An === T) { checkDuras = false; break; }
          if(dia.Vi === T && dataAyer.Vi === T) { checkDuras = false; break; }
          if(dia.Me === T && dataAyer.Me === T) { checkDuras = false; break; }
          if(dia.My === T && dataAyer.My === T) { checkDuras = false; break; }
        }
      }

      if(checkDuras) {
        nuevasAsignaciones.push(...propuesta);
        bdTemporal.push(...propuesta);
        exitoSemana = true;
      }
    }

    if(!exitoSemana) {
      alert("El algoritmo colisionó debido a restricciones. Inténtalo de nuevo.");
      return;
    }
    curr.setDate(curr.getDate() + 7);
  }

  // Mezclar los nuevos registros del mes sobreescribiendo si ya existían parcialmente
  nuevasAsignaciones.forEach(n => {
    let index = DB_PROGRAMACION.findIndex(x => x.fecha === n.fecha);
    if(index !== -1) DB_PROGRAMACION[index] = n;
    else DB_PROGRAMACION.push(n);
  });

  DB_PROGRAMACION.sort((a,b) => new Date(a.fecha) - new Date(b.fecha));
  renderizarCalendario();

  const blob = new Blob([JSON.stringify(DB_PROGRAMACION, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const aDom = document.createElement('a'); aDom.href = url;
  aDom.download = 'programacion.json'; aDom.click();
  alert("¡Mes chocolateado con éxito!\nSe descargó tu 'programacion.json' actualizado. Reemplázalo en tu carpeta /data.");
}

window.onload = cargarDatosBase;
</script>
